<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Odds of War — Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a227;
      --gold-dim: #a07d18;
      --gold-glow: rgba(201,162,39,0.25);
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e0cc;
      --text-dim: #888;
      --red: #c0392b;
      --green: #27ae60;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Chakra Petch', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,162,39,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,162,39,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, #000 100%);
      pointer-events: none;
      z-index: 0;
    }

    .auth-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo a {
      text-decoration: none;
      color: var(--gold);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .logo span {
      color: var(--text-dim);
      font-weight: 400;
    }

    .logo-sub {
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--text-dim);
      margin-top: 4px;
      text-transform: uppercase;
    }

    /* Card */
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--gold);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* Tabs */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: 'Chakra Petch', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 16px 8px;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
      background: rgba(201,162,39,0.05);
    }

    /* Panels */
    .tab-panel {
      display: none;
      padding: 32px;
    }

    .tab-panel.active { display: block; }

    /* Form elements */
    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Chakra Petch', monospace;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    input::placeholder { color: #444; }

    /* Primary button */
    .btn-primary {
      width: 100%;
      background: var(--gold);
      color: #000;
      border: none;
      font-family: 'Chakra Petch', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    .btn-primary:hover { background: #e0b52c; }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled {
      background: #555;
      color: #888;
      cursor: not-allowed;
    }

    /* Staff button variant */
    .btn-staff {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold);
    }

    .btn-staff:hover {
      background: var(--gold);
      color: #000;
    }

    /* Alert messages */
    .alert {
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      letter-spacing: 0.5px;
    }

    .alert.show { display: block; }
    .alert-error { background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.4); color: #e74c3c; }
    .alert-success { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.4); color: #2ecc71; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 2px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Footer link */
    .auth-footer {
      text-align: center;
      padding: 20px 32px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dim);
    }

    .auth-footer a {
      color: var(--gold);
      text-decoration: none;
    }

    /* Staff badge */
    .staff-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(201,162,39,0.1);
      border: 1px solid rgba(201,162,39,0.3);
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 10px;
      margin-bottom: 20px;
    }

    .staff-badge::before {
      content: '★';
      font-size: 9px;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Back link */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--gold); }

    @media (max-width: 480px) {
      .tab-panel { padding: 24px 20px; }
      .tab-btn { font-size: 10px; padding: 14px 4px; }
      .auth-footer { padding: 16px 20px; }
    }
  </style>
</head>
<body>

<div class="auth-wrapper">

  <div class="logo">
    <a href="index.html">ODDS <span>OF</span> WAR</a>
    <div class="logo-sub">Player Access Portal</div>
  </div>

  <div class="auth-card">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
      <button class="tab-btn" onclick="switchTab('staff')">Staff</button>
    </div>

    <!-- LOGIN PANEL -->
    <div class="tab-panel active" id="panel-login">
      <div class="alert alert-error" id="login-error"></div>
      <div class="alert alert-success" id="login-success"></div>

      <div class="field">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username"/>
      </div>

      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password"/>
      </div>

      <button class="btn-primary" id="login-btn" onclick="handleLogin()">
        Enter Battlefield
      </button>
    </div>

    <!-- SIGNUP PANEL -->
    <div class="tab-panel" id="panel-signup">
      <div class="alert alert-error" id="signup-error"></div>
      <div class="alert alert-success" id="signup-success"></div>

      <div class="field">
        <label for="signup-username">Username</label>
        <input type="text" id="signup-username" placeholder="Choose a username" autocomplete="username"/>
      </div>

      <div class="field">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="your@email.com" autocomplete="email"/>
      </div>

      <div class="field">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="Min. 8 characters" autocomplete="new-password"/>
      </div>

      <div class="field">
        <label for="signup-confirm">Confirm Password</label>
        <input type="password" id="signup-confirm" placeholder="Repeat password"/>
      </div>

      <button class="btn-primary" id="signup-btn" onclick="handleSignup()">
        Create Account
      </button>
    </div>

    <!-- STAFF PANEL -->
    <div class="tab-panel" id="panel-staff">
      <div class="staff-badge">Staff Portal</div>

      <div class="alert alert-error" id="staff-error"></div>
      <div class="alert alert-success" id="staff-success"></div>

      <div class="field">
        <label for="staff-username">Staff Username</label>
        <input type="text" id="staff-username" placeholder="Enter your username" autocomplete="username"/>
      </div>

      <div class="field">
        <label for="staff-password">Password</label>
        <input type="password" id="staff-password" placeholder="Enter your password" autocomplete="current-password"/>
      </div>

      <button class="btn-primary" id="staff-btn" onclick="handleStaffLogin()">
        Staff Login
      </button>

      <div class="divider">or</div>

      <button class="btn-primary btn-staff" onclick="window.location.href='staff-auth.html'">
        Register with Invite Code
      </button>
    </div>

    <!-- Footer -->
    <div class="auth-footer" id="auth-footer-login">
      Don't have an account? <a href="#" onclick="switchTab('signup'); return false;">Sign up here</a>
    </div>
  </div>

  <a href="index.html" class="back-link">← Back to Home</a>
</div>

<script>
  const API = 'https://odds-backend-production.up.railway.app';

  // ─── Tab Switching ─────────────────────────────────────────────────────────
  const footerMessages = {
    login:  'Don\'t have an account? <a href="#" onclick="switchTab(\'signup\'); return false;">Sign up here</a>',
    signup: 'Already have an account? <a href="#" onclick="switchTab(\'login\'); return false;">Log in</a>',
    staff:  'Not staff yet? <a href="staff-auth.html">Register with an invite code</a>'
  };

  function switchTab(tab) {
    // Update buttons
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      const tabs = ['login', 'signup', 'staff'];
      btn.classList.toggle('active', tabs[i] === tab);
    });

    // Update panels
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');

    // Update footer
    document.getElementById('auth-footer-login').innerHTML = footerMessages[tab];

    // Clear alerts
    clearAlerts();
  }

  function clearAlerts() {
    document.querySelectorAll('.alert').forEach(el => {
      el.classList.remove('show');
      el.textContent = '';
    });
  }

  function showAlert(id, msg, type = 'error') {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.className = 'alert show alert-' + type;
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    if (loading) {
      btn._original = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span>Processing...';
      btn.disabled = true;
    } else {
      btn.innerHTML = btn._original || btn.innerHTML;
      btn.disabled = false;
    }
  }

  // ─── Check if already logged in ───────────────────────────────────────────
  (function checkAuth() {
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    if (!token) return;

    // Staff or player redirect
    if (role && role !== 'player') {
      window.location.href = 'staff-dashboard.html';
    } else if (role === 'player') {
      window.location.href = 'user-dashboard.html';
    }
  })();

  // ─── Handle tab from URL hash ──────────────────────────────────────────────
  (function checkHash() {
    const hash = window.location.hash.replace('#', '');
    if (['login', 'signup', 'staff'].includes(hash)) {
      switchTab(hash);
    }
  })();

  // ─── Login ─────────────────────────────────────────────────────────────────
  async function handleLogin() {
    clearAlerts();
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;

    if (!username || !password) {
      showAlert('login-error', 'Please fill in all fields.');
      return;
    }

    setLoading('login-btn', true);

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert('login-error', data.error || data.message || 'Login failed.');
        return;
      }

      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.user?.username || username);
      localStorage.setItem('role', data.user?.role || 'player');

      showAlert('login-success', 'Login successful! Redirecting...', 'success');

      setTimeout(() => {
        window.location.href = 'user-dashboard.html';
      }, 800);

    } catch (err) {
      showAlert('login-error', 'Cannot reach server. Try again later.');
    } finally {
      setLoading('login-btn', false);
    }
  }

  // ─── Signup ────────────────────────────────────────────────────────────────
  async function handleSignup() {
    clearAlerts();
    const username = document.getElementById('signup-username').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const confirm  = document.getElementById('signup-confirm').value;

    if (!username || !email || !password || !confirm) {
      showAlert('signup-error', 'Please fill in all fields.');
      return;
    }
    if (password.length < 8) {
      showAlert('signup-error', 'Password must be at least 8 characters.');
      return;
    }
    if (password !== confirm) {
      showAlert('signup-error', 'Passwords do not match.');
      return;
    }

    setLoading('signup-btn', true);

    try {
      const res = await fetch(`${API}/auth/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert('signup-error', data.error || data.message || 'Signup failed.');
        return;
      }

      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.user?.username || username);
      localStorage.setItem('role', data.user?.role || 'player');

      showAlert('signup-success', 'Account created! Redirecting...', 'success');

      setTimeout(() => {
        window.location.href = 'user-dashboard.html';
      }, 800);

    } catch (err) {
      showAlert('signup-error', 'Cannot reach server. Try again later.');
    } finally {
      setLoading('signup-btn', false);
    }
  }

  // ─── Staff Login ───────────────────────────────────────────────────────────
  async function handleStaffLogin() {
    clearAlerts();
    const username = document.getElementById('staff-username').value.trim();
    const password = document.getElementById('staff-password').value;

    if (!username || !password) {
      showAlert('staff-error', 'Please fill in all fields.');
      return;
    }

    setLoading('staff-btn', true);

    try {
      const res = await fetch(`${API}/auth/staff-login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert('staff-error', data.error || data.message || 'Staff login failed. Are you registered as staff?');
        return;
      }

      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.user?.username || username);
      localStorage.setItem('role', data.user?.role || 'support');

      showAlert('staff-success', `Welcome, ${data.user?.username || username}! Redirecting to dashboard...`, 'success');

      setTimeout(() => {
        window.location.href = 'staff-dashboard.html';
      }, 800);

    } catch (err) {
      showAlert('staff-error', 'Cannot reach server. Try again later.');
    } finally {
      setLoading('staff-btn', false);
    }
  }

  // Enter key support
  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    const active = document.querySelector('.tab-panel.active');
    if (!active) return;
    const id = active.id;
    if (id === 'panel-login')  handleLogin();
    if (id === 'panel-signup') handleSignup();
    if (id === 'panel-staff')  handleStaffLogin();
  });
</script>
</body>
</html>
